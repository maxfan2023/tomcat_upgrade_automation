# prod-cont configuration for upgrade_jdk.sh

JAVA_BASE_DIR="/FCR_APP/abinitio/java"
JDK_SOFTWARE_DIR="/FCR_APP/abinitio/software/java/jdk11"
DEFAULT_JAVA_VERSION="11.0.31"
DEFAULT_JDK_ARCHIVE="zulu11.88.18-sa-jdk11.0.31-linux_x64.tar.gz"
DEFAULT_JDK_DIR="zulu11.88.18-sa-jdk11.0.31-linux_x64"
TARGET_JDK_CHMOD_MODE="2755"

JDK_SYMLINKS=(jdk-11.0.11 jdk1.8.0_191)
PRIMARY_JDK_SYMLINK="jdk-11.0.11"

# prod-cont does not stop/start application services unless commands are added.
STOP_COMMANDS=()
START_COMMANDS=()

DB_UPDATE_HOSTS=(
  gbl25164751.hc.cloud.uk.hsbc
)
DB_JDK_COPY_HOSTS=(
  gbl25164751.hc.cloud.uk.hsbc
)
DB_UPDATE_COMMAND="/bin/bash /opt/clouseau/upgrade_jdk_on_db.sh"
DB_JDK_COPY_SOURCE_PATH="${JAVA_BASE_DIR}/jdk-11.0.11/${DEFAULT_JDK_DIR}"
DB_JDK_COPY_DEST_DIR="/opt/clouseau/java/"
DB_UPDATE_REMOTE_DIR="/opt/clouseau"
DB_UPDATE_REMOTE_SCRIPT="${DB_UPDATE_REMOTE_DIR}/upgrade_jdk_on_db.sh"
DB_UPDATE_REMOTE_CONFIG="${DB_UPDATE_REMOTE_DIR}/jdk_pg_upgrade_prod-cont.conf"
DB_UPDATE_SCRIPT_SOURCE="${REPO_ROOT}/scripts/jdk/upgrade_jdk_on_db.sh"
DB_UPDATE_CONFIG_SOURCE="${REPO_ROOT}/configs/jdk/jdk_pg_upgrade_prod-cont.conf"
SKIP_DB_UPDATE_STEP="yes"

DELETE_OLD_JDK_AFTER_ARCHIVE="yes"
LOG_DIR="${REPO_ROOT}/logs"
STATE_DIR="${REPO_ROOT}/.state"
LOG_RETENTION_DAYS=90

POST_STOP_CHECK_CMD=""
POST_START_CHECK_CMD=""
