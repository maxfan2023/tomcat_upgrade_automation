# Default configuration for the Tomcat upgrade automation.
# This file is intentionally public-safe and uses generic sample paths.
# Copy it and replace the values with your real environment settings.

DEFAULT_TOMCAT_VERSION="9.0.116"
SOFTWARE_TOMCAT_ROOT="/opt/abinitio/software/Tomcat"
ABINITIO_TMP_DIR="/opt/abinitio/tmp"
APPS_SUBDIR="abinitio-app-hub/apps"

CATA_HOME_DIR_NAME="catalina-home-9.0"
CATA_BASE_DIR_NAME="catalina-base-9.0"
CATA_BASE_TMPLT_DIR_NAME="catalina-base-9.0-tmplt"

LOG_DIR="${REPO_ROOT}/logs"
STATE_DIR="${REPO_ROOT}/.state"
LOG_RETENTION_DAYS=90
SHELL_EXECUTABLE="bash"

ENVIRONMENTS=(
  ienv
  denv
  benv
  penv
  penv-cont
)

# The filesystem key lets one logical env reuse another env's filesystem layout.
# penv-cont intentionally points to penv because the prompt uses the same paths.
ENV_FILESYSTEM_KEY__ienv="ienv"
ENV_FILESYSTEM_KEY__denv="denv"
ENV_FILESYSTEM_KEY__benv="benv"
ENV_FILESYSTEM_KEY__penv="penv"
ENV_FILESYSTEM_KEY__penv_cont="penv"

ENV_BASE_DIR__ienv="/opt/abinitio/ienv"
ENV_BASE_DIR__denv="/opt/abinitio/denv"
ENV_BASE_DIR__benv="/opt/abinitio/benv"
ENV_BASE_DIR__penv="/opt/abinitio/penv"
ENV_BASE_DIR__penv_cont="/opt/abinitio/penv"

ENV_PROFILE__ienv="/opt/abinitio/management/scripts/ab.profile.ienv-V4-3-1-6"
ENV_PROFILE__denv="/opt/abinitio/management/scripts/ab.profile.denv-V4-3-1-6"
ENV_PROFILE__benv="/opt/abinitio/management/scripts/ab.profile.benv-V4-3-1-6"
ENV_PROFILE__penv="/opt/abinitio/management/scripts/ab.profile.penv-V4-3-1-6"
ENV_PROFILE__penv_cont="/opt/abinitio/management/scripts/ab.profile.penv-V4-3-1-6"

ENV_RUNNER__ienv="/opt/abinitio/management/scripts/ienv.abinitio.runner.sh"
ENV_RUNNER__denv="/opt/abinitio/management/scripts/denv.abinitio.runner.sh"
ENV_RUNNER__benv="/opt/abinitio/management/scripts/benv.abinitio.runner.sh"
ENV_RUNNER__penv="/opt/abinitio/management/scripts/penv.abinitio.runner.sh"
ENV_RUNNER__penv_cont="/opt/abinitio/management/scripts/penv.abinitio.runner.sh"

# Optional command to run before sourcing the env profile during step 5 install.
ENV_INSTALL_PRE_SOURCE_CMD__penv_cont="export AB_HOST_INTERFACE=gbl25164751.hc.cloud.uk.hsbc"

ENV_SHOULD_CONTROL_SERVICE__ienv="yes"
ENV_SHOULD_CONTROL_SERVICE__denv="yes"
ENV_SHOULD_CONTROL_SERVICE__benv="yes"
ENV_SHOULD_CONTROL_SERVICE__penv="yes"
ENV_SHOULD_CONTROL_SERVICE__penv_cont="no"

ENV_APP_PURGE_TARGETS__ienv="agienv ccienv ccienvnext eiienv mhdrienv"
ENV_APP_PURGE_TARGETS__denv="agdenv ccdenv eidenv mhdrdenv"
ENV_APP_PURGE_TARGETS__benv="agbenv ccbenv amlccbenv mhdrbenv"
ENV_APP_PURGE_TARGETS__penv="agpenv ccpenv amlccpenv mhdrpenv"
ENV_APP_PURGE_TARGETS__penv_cont="agpenv ccpenv amlccpenv mhdrpenv"

# Optional health-check hooks. Leave them blank if you do not want extra checks.
# Example:
# ENV_POST_START_CHECK_CMD__ienv='test -f /path/to/ready.flag'
ENV_POST_STOP_CHECK_CMD__ienv=""
ENV_POST_STOP_CHECK_CMD__denv=""
ENV_POST_STOP_CHECK_CMD__benv=""
ENV_POST_STOP_CHECK_CMD__penv=""
ENV_POST_STOP_CHECK_CMD__penv_cont=""

ENV_POST_START_CHECK_CMD__ienv=""
ENV_POST_START_CHECK_CMD__denv=""
ENV_POST_START_CHECK_CMD__benv=""
ENV_POST_START_CHECK_CMD__penv=""
ENV_POST_START_CHECK_CMD__penv_cont=""
